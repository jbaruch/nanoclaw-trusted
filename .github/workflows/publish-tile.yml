name: Review & Publish Tile

permissions:
  id-token: write
  contents: write

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Required by jbaruch/coding-policy/.github/actions/skill-review:
          # the action runs `git diff $BEFORE..HEAD` to find changed skills.
          # The action falls back to a depth-recovery fetch if needed, but
          # `fetch-depth: 0` keeps the path predictable.
          fetch-depth: 0

      - uses: tesslio/setup-tessl@v2
        with:
          token: ${{ secrets.TESSL_TOKEN }}

      # Reviews only the skills whose files changed in this push, instead
      # of every skill in the tile every time. Action lives in
      # jbaruch/coding-policy so improvements land once and propagate to
      # every consumer plugin.
      - name: Skill review (changed only)
        uses: jbaruch/coding-policy/.github/actions/skill-review@b63f13ea80e92c784cf71fc74ed98f71b15f2aa2 # v0.x
        with:
          threshold: '85'

      - name: Lint tile
        run: tessl tile lint .

      # Stamp the CHANGELOG's top un-headed `### ` entries with the version
      # patch-version-publish is about to assign, so the published artifact and
      # registry "what's new" show them under their real version instead of an
      # `Unreleased` bucket (forbidden by jbaruch/coding-policy: context-artifacts).
      # Idempotent no-op when the top section already carries a `## ` heading.
      # Must run immediately before publish; action + script live in coding-policy.
      - name: Stamp CHANGELOG
        uses: jbaruch/coding-policy/.github/actions/stamp-changelog@e27f699fa03965351c0d8e15c481e6cb320d6a81 # v0.x

      - uses: tesslio/patch-version-publish@v1
        with:
          token: ${{ secrets.TESSL_TOKEN }}
